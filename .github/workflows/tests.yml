name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install Draftpaper-loop
        run: python -m pip install -e .[dev]
      - name: Run tests
        run: python -m pytest

  wheel-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install build dependencies
        run: python -m pip install build
      - name: Build wheel
        run: python -m build --wheel
      - name: Verify isolated wheel resources
        run: python tools/verify_wheel_install.py --wheel-dir dist
