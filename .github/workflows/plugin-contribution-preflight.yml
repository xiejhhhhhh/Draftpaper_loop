name: plugin contribution preflight

on:
  pull_request:
    branches: [main]

jobs:
  plugin-contribution-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install Draftpaper-loop
        run: python -m pip install -c requirements/ci-constraints.txt -e .[dev]
      - name: Preflight and review packaged plugin contributions
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t packages < <(find . -path '*/contribution_package/candidate_manifest.json' -printf '%h\n' | sort -u)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No packaged plugin contributions found."
            exit 0
          fi
          for package in "${packages[@]}"; do
            echo "Preflight ${package}"
            python -m draftpaper_cli.cli preflight-plugin-contribution --package "${package}"
            echo "Maintainer review ${package}"
            python -m draftpaper_cli.cli review-plugin-contribution --package "${package}"
          done
