route_contract:
  landing_html:
    success_requires:
      - CloakBrowser loads an Annual Reviews DOI landing page through /content/journals/{doi} or
        /doi/{doi}
      - "dynamic full-text container #html_fulltext or #itemFullTextId is present or can be resolved from
        the landing page"
      - Crossref or landing metadata identifies an Annual Reviews journal article
    reject_if_any:
      - Cloudflare challenge page
      - access gate only
      - static Full text loading shell without populated dynamic article content
      - Knowable Magazine content or 10.1146/knowable-* DOI
      - issue page or non-article landing page
    notes: Landing HTML is browser-only discovery input; direct HTTP challenge responses are
      diagnostic and must not be accepted as successful route output.
  article_html:
    success_requires:
      - "CloakBrowser-rendered page contains #html_fulltext or #itemFullTextId"
      - provider article body contains .articleSection sections
      - title or DOI metadata is present
      - body text includes full-text sections and references
    reject_if_any:
      - challenge page
      - access gate only
      - site navigation only
      - empty article shell
      - static Full text loading shell
      - Knowable Magazine content or 10.1146/knowable-* DOI
      - PowerPoint or PPT links classified as supplementary material
    min_body_chars: 5000
    min_body_sections: 2
    notes: Provider-owned extraction should target .articleSection body sections,
      .html-fulltext-responsive-figure figures, and .html-fulltext-inline-table tables instead of
      the generic Atypon browser extraction path.
  pdf_fallback:
    success_requires:
      - seeded-browser PDF navigation uses Crossref full-text URL, landing PDF action, or
        /doi/pdf/{doi}
      - final response reaches Annual Reviews docserver PDF bytes
      - PDF response has application/pdf content type or PDF magic bytes
      - PDF text extraction produces body text
    reject_if_any:
      - HTML wrapper
      - challenge page
      - access gate page
      - error page
    require_pdf_magic: true
    reject_html_wrapper: true
    notes: PDF fallback is text-only and should not attempt body asset extraction.
  abstract_only:
    success_requires:
      - provider-managed page or payload exposes abstract text
      - source trail marks abstract-only degradation after HTML and PDF routes fail
    reject_if_any:
      - empty shell
      - full-text body misclassified as abstract-only
      - challenge page
  metadata_only:
    success_requires:
      - metadata contains DOI or title
      - source trail marks metadata-only fallback
    reject_if_any:
      - fabricated body text
      - provider-specific fulltext source without fulltext
