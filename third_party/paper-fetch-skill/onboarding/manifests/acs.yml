route_contract:
  article_html:
    success_requires:
      - ACS Publications DOI page exposes an article body container on pubs.acs.org
      - title or DOI metadata is present
      - body text or body sections are present
    reject_if_any:
      - challenge page
      - access gate only
      - site navigation only
      - empty article shell
    min_body_chars: 1200
    min_body_sections: 1
  pdf_fallback:
    success_requires:
      - ACS Publications PDF or ePDF response has application/pdf content type or
        PDF magic bytes
      - PDF text extraction produces body text
    reject_if_any:
      - HTML wrapper
      - challenge page
      - access gate page
      - error page
    require_pdf_magic: true
    reject_html_wrapper: true
  abstract_only:
    success_requires:
      - provider-managed page or payload exposes abstract text
      - source trail marks abstract-only degradation
    reject_if_any:
      - empty shell
      - fulltext body misclassified as abstract-only
markdown_contract:
  structure:
    doi: 10.1021/acsomega.4c03987
    must_include:
      - '## Abstract'
    must_not_include:
      - Download Citation
  table:
    doi: 10.1021/acsomega.4c03987
    must_include:
      - Table 1
      - OPD conversion
    must_not_include:
      - Google Scholar
    must_match:
      - (?m)^\|.+\|$
  formula:
    doi: 10.1021/acsomega.3c06992
    must_include:
      - NPOH equation
      - S_{CNE}
      - $$
    must_not_include:
      - '[Formula unavailable]'
      - Download Citation
    must_match:
      - (?s)\$\$.*S_\{CNE\}.*\$\$
  figure:
    doi: 10.1021/acsomega.4c03987
    must_include:
      - Figure
    must_not_include:
      - Article Views
    must_match:
      - (?:!\[Figure|\*\*Figure)
  references:
    doi: 10.1021/acsomega.4c03987
    must_include:
      - Reference
    must_not_include:
      - Google Scholar
  supplementary:
    doi: 10.1021/acsomega.4c03987
    must_include:
      - Supporting Information
      - ao4c03987_si_001.pdf
    must_not_include:
      - Download Citation
  pdf_fallback:
    doi: 10.1021/acsomega.2c02828
    must_include:
      - General Equation to Express Changes
      - NPOH equation
    must_not_include:
      - Download Citation
    must_match:
      - (?m)^# General Equation to Express Changes
