route_contract:
  article_html:
    success_requires:
      - provider article container is present
      - title or DOI metadata is present
      - body text or body sections are present
    reject_if_any:
      - challenge page
      - access gate only
      - site navigation only
      - empty article shell
    min_body_chars: 1200
    min_body_sections: 1
  pdf_fallback:
    success_requires:
      - PDF response has application/pdf content type or PDF magic bytes
      - PDF text extraction produces body text
    reject_if_any:
      - HTML wrapper
      - challenge page
      - access gate page
      - error page
    require_pdf_magic: true
    reject_html_wrapper: true
  abstract_only:
    success_requires:
      - provider-managed page or payload exposes abstract text
      - source trail marks abstract-only degradation
    reject_if_any:
      - empty shell
      - fulltext body misclassified as abstract-only
markdown_contract:
  structure:
    doi: 10.1073/pnas.2309123120
    must_include:
      - '## Abstract'
    must_not_include:
      - Download PDF
  figure:
    doi: 10.1073/pnas.2309123120
    must_include:
      - Figure
    must_not_include:
      - Article Metrics
    must_match:
      - (?:!\[Figure|\*\*Figure)
  references:
    doi: 10.1073/pnas.2309123120
    must_include:
      - Reference
    must_not_include:
      - Google Scholar
  pdf_fallback:
    doi: 10.1073/pnas.2406303121
