route_contract:
  article_html:
    success_requires:
    - provider article container is present
    - title or DOI metadata is present
    - body text or body sections are present
    reject_if_any:
    - challenge page
    - access gate only
    - site navigation only
    - empty article shell
    min_body_chars: 1200
    min_body_sections: 1
  pdf_fallback:
    success_requires:
    - PDF response has application/pdf content type or PDF magic bytes
    - PDF text extraction produces body text
    reject_if_any:
    - HTML wrapper
    - challenge page
    - access gate page
    - error page
    require_pdf_magic: true
    reject_html_wrapper: true
  metadata_only:
    success_requires:
    - metadata contains DOI or title
    - source trail marks metadata-only fallback
    reject_if_any:
    - fabricated body text
    - provider-specific fulltext source without fulltext
markdown_contract:
  structure:
    doi: 10.3390/membranes15030093
    must_include:
    - '## Abstract'
    must_not_include:
    - Download PDF
  table:
    doi: 10.3390/su12072826
    must_include:
    - Table
    must_not_include:
    - Google Scholar
    must_match:
    - (?m)^\|.+\|$
  formula:
    doi: 10.3390/math11030657
    must_include:
    - Equation
    must_not_include:
    - '[Formula unavailable]'
    must_match:
    - (?:\$\$|!\[Formula\]|Equation)
  figure:
    doi: 10.3390/rs16010010
    must_include:
    - Figure
    must_not_include:
    - Article Metrics
    must_match:
    - (?:!\[Figure|\*\*Figure)
  supplementary:
    doi: 10.3390/s23010001
    must_include:
    - Supplementary
    must_not_include:
    - Download Citation
  references:
    doi: 10.3390/w15040758
    must_include:
    - Reference
    must_not_include:
    - Google Scholar
  pdf_fallback:
    doi: 10.3390/en16186655
    must_include:
    - '#'
    must_not_include:
    - Access Denied
