success_criteria: {}
route_contract:
  landing_html:
    success_requires:
      - provider landing page resolves a fulltext route or fallback candidate
      - response is not a browser challenge or empty shell
    reject_if_any:
      - challenge page
      - empty shell
    notes: Landing HTML is discovery-only unless the provider declares it as article content.
  xml:
    success_requires:
      - article XML root is present
      - title or DOI metadata is present
      - body sections or body paragraphs are present
    reject_if_any:
      - metadata-only XML
      - empty body
    min_body_chars: 1200
    min_body_sections: 1
  pdf_fallback:
    success_requires:
      - PDF response has application/pdf content type or PDF magic bytes
      - PDF text extraction produces body text
    reject_if_any:
      - HTML wrapper
      - challenge page
      - access gate page
      - error page
    require_pdf_magic: true
    reject_html_wrapper: true
  metadata_only:
    success_requires:
      - metadata contains DOI or title
      - source trail marks metadata-only fallback
    reject_if_any:
      - fabricated body text
      - provider-specific fulltext source without fulltext
markdown_contract:
  structure:
    doi: 10.5194/acp-24-1-2024
    must_include:
      - '## Abstract'
    must_not_include:
      - Download PDF
  figure:
    doi: 10.5194/acp-24-1-2024
    must_include:
      - Figure
    must_not_include:
      - Article Metrics
    must_match:
      - (?:!\[Figure|\*\*Figure)
  references:
    doi: 10.5194/acp-24-1-2024
    must_include:
      - Reference
    must_not_include:
      - Google Scholar
  pdf_fallback:
    doi: 10.5194/acp-1-1-2001
    must_include:
      - '#'
    must_not_include:
      - Access Denied
