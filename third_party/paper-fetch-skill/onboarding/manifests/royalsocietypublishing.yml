route_contract:
  article_html:
    success_requires:
      - direct /doi/{doi} request redirects to a Royal Society Publishing Silverchair article page
      - provider article body container is present
      - title or DOI metadata is present
      - body sections or paragraphs are present
    reject_if_any:
      - challenge page
      - access gate only
      - site navigation only
      - empty article shell
      - citation_xml_url fallback used as XML full text
    min_body_chars: 1200
    min_body_sections: 1
    notes: The approved route is direct HTTP DOI HTML; citation_xml_url redirects to provider HTML
      and is not an XML route.
  pdf_fallback:
    success_requires:
      - citation_pdf_url or /doi/pdf/{doi} returns PDF bytes after redirects
      - PDF response has PDF magic bytes
      - PDF text extraction produces body text
    reject_if_any:
      - HTML wrapper
      - challenge page
      - access gate page
      - error page
    require_pdf_magic: true
    reject_html_wrapper: true
  metadata_only:
    success_requires:
      - metadata contains DOI or title
      - source trail marks metadata-only fallback
    reject_if_any:
      - fabricated body text
      - provider-specific fulltext source without fulltext
