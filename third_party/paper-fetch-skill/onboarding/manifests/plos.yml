route_contract:
  xml:
    success_requires:
    - journals.plos.org article file type=manuscript returns JATS XML after redirects
    - XML response parses as a JATS article
    - title or DOI metadata is present
    - body sections, abstract, or references are present
    reject_if_any:
    - HTML wrapper
    - challenge page
    - access gate page
    - empty article shell
    - metadata-only XML without article body or references
    min_body_chars: 1200
    min_body_sections: 1
    notes: Access review approves public PLOS JATS XML as the main full-text route
      and excludes HTML as a full-text route for onboarding.
  pdf_fallback:
    success_requires:
    - journals.plos.org article file type=printable returns PDF bytes after redirects
    - PDF response has application/pdf content type or PDF magic bytes
    - PDF text extraction produces body text
    reject_if_any:
    - HTML wrapper
    - challenge page
    - access gate page
    - error page
    require_pdf_magic: true
    reject_html_wrapper: true
  metadata_only:
    success_requires:
    - metadata contains DOI or title
    - source trail marks metadata-only fallback
    reject_if_any:
    - fabricated body text
    - provider-specific fulltext source without fulltext
markdown_contract:
  structure:
    doi: 10.1371/journal.pone.0263725
    must_include:
    - '## Abstract'
    - Social media usage to share information in communication journals
    must_not_include:
    - Download PDF
  table:
    doi: 10.1371/journal.pone.0304873
    must_include:
    - Table
    - lookup table technique
    must_not_include:
    - Download PDF
    - Article metrics
    must_match:
    - (?m)^\|.+\|$
  formula:
    doi: 10.1371/journal.pone.0126635
    must_include:
    - Boussinesq-Burgers Equation
    - Equation
    must_not_include:
    - '[Formula unavailable]'
    - Download PDF
    must_match:
    - (?:\$\$|Equation|formula)
  figure:
    doi: 10.1371/journal.pone.0015338
    must_include:
    - Figure Text Extraction in Biomedical Literature
    - Figure
    must_not_include:
    - Download PDF
    - Article metrics
    must_match:
    - (?:!\[Figure|\*\*Figure|Figure\s+1)
  supplementary:
    doi: 10.1371/journal.pone.0218513
    must_include:
    - Supporting Information
    - desiccation tolerance
    must_not_include:
    - Download PDF
    - Article metrics
  references:
    doi: 10.1371/journal.pone.0026949
    must_include:
    - '## References'
    - Non-Hodgkin Lymphoma
    must_not_include:
    - Google Scholar
    - Download PDF
  pdf_fallback:
    doi: 10.1371/journal.pbio.0040298
    must_include:
    - '#'
    - Escherichia coli
    must_not_include:
    - Access Denied
