      - Figure
    must_not_include:
      - Article metrics
  references:
    doi: 10.1088/1748-9326/ab7d02
    must_include:
      - '## References'
    must_not_include:
      - Export citation
  supplementary:
    doi: 10.1088/1748-9326/ab7d02
    must_include:
      - stacks.iop.org/ERL/15/054014/mmedia
      - Supplementary table 1
    must_not_include:
      - Download PDF
      - Article metrics
  pdf_fallback:
    doi: 10.1088/1748-9326/aa9f73
    must_include:
      - 'source: "iop_pdf"'
      - '## **Abstract**'
    must_not_include:
      - Radware Bot Manager
      - hCaptcha
