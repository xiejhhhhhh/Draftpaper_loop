route_contract:
  article_html:
    success_requires:
      - CloakBrowser-rendered IOPScience article page exposes title metadata and an article body container
      - body sections appear after the abstract and before metrics or citation chrome
      - provider availability accepts explicit articleBody or IOPScience article markers
    reject_if_any:
      - Radware Bot Manager or hCaptcha challenge page
      - access gate only
      - site navigation only
      - empty article shell
    min_body_chars: 1200
    min_body_sections: 1
    notes: Direct HTTP article, PDF, meta, and XML probes can return Radware/hCaptcha HTML
      in the current environment and must not be accepted as article content.
  pdf_fallback:
    success_requires:
      - seeded-browser PDF navigation uses the IOPScience /article/{doi}/pdf route
      - PDF response has application/pdf content type or PDF magic bytes
      - PDF text extraction produces body text
    reject_if_any:
      - HTML wrapper
      - Radware Bot Manager or hCaptcha challenge page
      - access gate page
      - error page
    require_pdf_magic: true
    reject_html_wrapper: true
    notes: PDF fallback is text-only; IOP TDM delivery is SFTP-backed and is not
      implemented as an unauthenticated XML/PDF route.
  abstract_only:
    success_requires:
      - provider-managed page or payload exposes abstract text
      - source trail marks abstract-only degradation after HTML and PDF routes fail
    reject_if_any:
      - empty shell
      - full-text body misclassified as abstract-only
      - challenge page
  metadata_only:
    success_requires:
      - metadata contains DOI or title
      - source trail marks metadata-only fallback
    reject_if_any:
      - fabricated body text
      - provider-specific fulltext source without fulltext
markdown_contract:
  structure:
    doi: 10.1088/1748-9326/ab7d02
    must_include:
      - '## Abstract'
    must_not_include:
      - Download PDF
      - Article metrics
  table:
    doi: 10.1088/2058-9565/ac3460
    must_include:
      - Table 1
      - '| Mean'
    must_not_include:
      - Download PDF
      - Article metrics
  formula:
    doi: 10.1088/2058-9565/ac3460
    must_include:
      - \begin{equation}
      - '{P}_{{C}_{s}}'
    must_not_include:
      - '![Formula]'
      - qstac3460eqn1.gif
      - Download PDF
      - Article metrics
  figure:
    doi: 10.1088/1748-9326/ab7d02
