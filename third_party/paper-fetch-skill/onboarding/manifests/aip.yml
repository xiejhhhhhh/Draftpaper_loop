route_contract:
  article_html:
    success_requires:
      - CloakBrowser-rendered AIP Publishing page exposes title metadata and an article
        body container on pubs.aip.org
      - body sections appear after the abstract and before article metrics or citation
        chrome
      - provider availability accepts AIP article markers, body figures, references,
        or article scoped section content
    reject_if_any:
      - Cloudflare or CAPTCHA challenge page
      - access gate only
      - site navigation only
      - empty article shell
    min_body_chars: 1200
    min_body_sections: 1
    notes: Direct HTTP may work for public pages with a browser user agent, but the
      provider route uses CloakBrowser because fixture discovery also observed HTTP
      403 responses for pubs.aip.org article and PDF URLs.
  pdf_fallback:
    success_requires:
      - seeded-browser PDF navigation uses the AIP /doi/pdf/{doi} or /doi/epdf/{doi}
        route
      - PDF response has application/pdf content type or PDF magic bytes
      - PDF text extraction produces body text
    reject_if_any:
      - HTML wrapper
      - Cloudflare or CAPTCHA challenge page
      - access gate page
      - error page
    require_pdf_magic: true
    reject_html_wrapper: true
    notes: PDF fallback is text-only; HTML success remains the preferred route for
      body figures, tables, formulas, and supplementary links.
  abstract_only:
    success_requires:
      - provider-managed page or payload exposes abstract text
      - source trail marks abstract-only degradation after HTML and PDF routes fail
    reject_if_any:
      - empty shell
      - full-text body misclassified as abstract-only
      - challenge page
  metadata_only:
    success_requires:
      - metadata contains DOI or title
      - source trail marks metadata-only fallback
    reject_if_any:
      - fabricated body text
      - provider-specific fulltext source without fulltext
markdown_contract:
  structure:
    doi: 10.1063/5.0129134
    must_include:
      - '## Abstract'
      - '## I. INTRODUCTION'
    must_not_include:
      - Download Citation
      - Article Navigation
  table:
    doi: 10.1063/5.0188905
    must_include:
      - Comparison of the lattice parameters
      - '| Method'
    must_not_include:
      - Google Scholar
      - Article Navigation
    must_match:
      - (?m)^\| Method\s+\|
  formula:
    doi: 10.1063/5.0188905
    must_include:
      - Equation 1.
      - \begin{matrix}
      - $$
    must_not_include:
      - '[Formula unavailable]'
      - Download Citation
  figure:
    doi: 10.1063/5.0129134
    must_include:
      - Figure 1
    must_not_include:
      - Open figure viewer
      - View large
      - Close modal
      - Article Navigation
    must_match:
      - '!\[Figure'
  supplementary:
    doi: 10.1063/5.0129134
    must_include:
      - SUPPLEMENTARY MATERIAL
      - supplementary material
    must_not_include:
      - Download Citation
      - Article Navigation
  references:
    doi: 10.1063/5.0129134
    must_include:
      - '## References'
      - Seitanidou
    must_not_include:
      - Google Scholar
      - Article Navigation
