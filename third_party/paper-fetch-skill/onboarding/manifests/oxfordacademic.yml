route_contract:
  article_html:
    success_requires:
      - Oxford Academic DOI or article URL resolves to a public academic.oup.com article
        page or provider-managed article-minimal HTML payload
      - provider article container is present
      - title or DOI metadata is present
      - body text or body sections are present
    reject_if_any:
      - challenge page
      - access gate only
      - site navigation only
      - empty article shell
      - institutional login or subscription-only prompt
    min_body_chars: 1200
    min_body_sections: 1
    notes: Approved discovery is HTTP for public Oxford Academic article and metadata
      routes; browser runtime is approved only for public PDF download fallback. Stop
      on challenge, CAPTCHA, paywall, or subscription-only content.
  pdf_fallback:
    success_requires:
      - public Oxford Academic article page exposes a PDF candidate or article-pdf
        route
      - PDF response has application/pdf content type or PDF magic bytes
      - PDF text extraction produces body text
    reject_if_any:
      - HTML wrapper
      - challenge page
      - access gate page
      - error page
      - institutional login or subscription-only prompt
    require_pdf_magic: true
    reject_html_wrapper: true
    notes: PDF fallback is text-only. Browser capture may follow the public Oxford
      Academic article-pdf chain to a Silverchair PDF only when the response validates
      as application/pdf or PDF magic bytes; it must not use login, subscription state,
      or challenge bypass.
  metadata_only:
    success_requires:
      - metadata contains DOI or title
      - source trail marks metadata-only fallback
    reject_if_any:
      - fabricated body text
      - provider-specific fulltext source without fulltext
