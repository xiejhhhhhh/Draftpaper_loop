success_criteria: {}
route_contract:
  landing_html:
    success_requires:
      - provider landing page resolves a fulltext route or fallback candidate
      - response is not a browser challenge or empty shell
    reject_if_any:
      - challenge page
      - empty shell
    notes: Landing HTML is discovery-only unless the provider declares it as article content.
  article_html:
    success_requires:
      - provider article container is present
      - title or DOI metadata is present
      - body text or body sections are present
    reject_if_any:
      - challenge page
      - access gate only
      - site navigation only
      - empty article shell
    min_body_chars: 1200
    min_body_sections: 1
  pdf_fallback:
    success_requires:
      - PDF response has application/pdf content type or PDF magic bytes
      - PDF text extraction produces body text
    reject_if_any:
      - HTML wrapper
      - challenge page
      - access gate page
      - error page
    require_pdf_magic: true
    reject_html_wrapper: true
  abstract_only:
    success_requires:
      - provider-managed page or payload exposes abstract text
      - source trail marks abstract-only degradation
    reject_if_any:
      - empty shell
      - fulltext body misclassified as abstract-only
markdown_contract:
  structure:
    doi: 10.1109/ACCESS.2024.3352924
    must_include:
      - '**Abstract.**'
    must_not_include:
      - Download PDF
  table:
    doi: 10.1109/TBME.2024.3434477
    must_include:
      - Table
    must_not_include:
      - Google Scholar
    must_match:
      - (?m)^\|.+\|$
  formula:
    doi: 10.1109/CICTN64563.2025.10932570
    must_include:
      - '$$'
    must_not_include:
      - '[Formula unavailable]'
    must_match:
      - (?:\$\$|!\[Formula\]|Equation)
  figure:
    doi: 10.1109/TIM.2024.3509573
    must_include:
      - Figure
    must_not_include:
      - Article Metrics
    must_match:
      - (?:!\[Figure|\*\*Figure)
  supplementary:
    doi: 10.1109/RITA.2026.3668995
    must_include:
      - Computational Thinking Assessment Instrument
    must_not_include:
      - Download Citation
  references:
    doi: 10.1109/ACCESS.2024.3352924
    must_include:
      - Reference
    must_not_include:
      - Google Scholar
  pdf_fallback:
    doi: 10.1109/MPER.1985.5526567
    must_include:
      - '#'
    must_not_include:
      - Access Denied
  abstract_only:
    doi: 10.1109/PGEC.1967.264619
    must_include:
      - '## Abstract'
    must_not_include:
      - Download PDF
