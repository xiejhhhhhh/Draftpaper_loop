schema_version: 1
provider: wiley
status: approved
reviewed_at: '2026-05-22T00:00:00Z'
reviewed_by: operator
legal_access:
  mode: institutional_subscription
  evidence:
  - onboarding/known-providers.yml marks wiley as implemented with manifest
    onboarding/manifests/wiley.yml.
  - onboarding/manifests/wiley.yml declares display_source=wiley_browser and
    main_path=['article_html', 'pdf_fallback', 'abstract_only'].
  - registered provider bundle sources=wiley_browser; requires_browser_runtime=True;
    requires_playwright=True.
  - docs/providers.md documents Wiley as a CloakBrowser HTML route with seeded-browser
    publisher PDF/ePDF fallback and an optional Wiley TDM API PDF lane; publisher
    access permissions and challenges remain operator-controlled.
  - 'manifest fixture abstract_only DOI 10.1111/gcb.16998 (medium confidence): Unit
    coverage exercises provider-managed abstract-only return when PDF recovery fails.'
  - 'manifest fixture figure DOI 10.1111/gcb.16414 (high confidence): Golden fixture
    contains inline Wiley figure blocks and figure asset links.'
  - 'manifest fixture formula DOI 10.1111/gcb.15322 (high confidence): Golden fixture
    contains Wiley formula image fallback markup used by provider tests.'
  - 'manifest fixture pdf_fallback DOI 10.1111/cas.16395 (high confidence): Wiley
    PDF fallback sample exercises publisher PDF and TDM API fallback lanes.'
  - 'manifest fixture references DOI 10.1111/gcb.16998 (high confidence): Expected
    golden criteria records Wiley reference extraction for this fixture.'
  - 'manifest fixture structure DOI 10.1111/gcb.16414 (high confidence): Provider
    benchmark and golden fixture cover the Wiley browser HTML route with body sections.'
  - 'manifest fixture supplementary DOI 10.1111/gcb.16414 (high confidence): Golden
    fixture contains a Supporting Information section with downloadable supplement
    links.'
  - 'manifest fixture table DOI 10.1111/cas.16395 (high confidence): Golden fixture
    contains body table markup and unit coverage renders it as Markdown table.'
allowed_runtimes:
- http
- browser
- playwright
forbidden_behaviors:
- automatic_login
- captcha_solving
- paywall_bypass
- challenge_bypass
challenge_policy:
  captcha: stop and report; do not solve automatically
  access_challenge: stop and report; do not bypass challenge pages
  rate_limit: retry only within normal provider retry budget or stop for operator
    review
site_temporary_policy:
  summary: No temporary exception is approved for Wiley onboarding.
  expires_at: null
may_continue: true
notes: Approved only for legal Wiley access already available in the operator
  environment, including public/open articles, institutional entitlement, or an
  operator-provided Wiley TDM token when configured; do not automate login, solve
  CAPTCHA, or bypass access gates.
