schema_version: 1
provider: ams
status: approved
reviewed_at: '2026-05-22T00:00:00Z'
reviewed_by: operator
legal_access:
  mode: institutional_subscription
  evidence:
  - onboarding/known-providers.yml marks ams as implemented with manifest
    onboarding/manifests/ams.yml.
  - onboarding/manifests/ams.yml declares display_source=ams_html and main_path=['landing_html',
    'article_html', 'pdf_fallback', 'abstract_only'].
  - registered provider bundle sources=ams_html, ams_pdf; requires_browser_runtime=True;
    requires_playwright=False.
  - docs/providers.md documents AMS as a DOI landing to CloakBrowser HTML route with
    seeded-browser publisher PDF fallback, and the provider must reject challenges,
    access gates, and empty shells.
  - 'manifest fixture figure DOI 10.1175/jamc-d-24-0048.1 (high confidence): Provider-local
    tests verify AMS figure asset placement and duplicate figure appendix suppression.'
  - 'manifest fixture formula DOI 10.1175/aies-d-23-0093.1 (high confidence): Provider-local
    tests verify AMS inline and display formula normalization from a real fixture.'
  - 'manifest fixture pdf_fallback DOI 10.1175/bams-d-24-0270.1 (high confidence):
    Golden fixture records AMS PDF fallback with a real PDF payload and expected output.'
  - 'manifest fixture references DOI 10.1175/jcli-d-23-0738.1 (medium confidence):
    Provider-local tests exercise AMS article assembly on a real fixture that includes
    reference extraction behavior.'
  - 'manifest fixture structure DOI 10.1175/bams-d-24-0223.1 (high confidence): Provider-local
    tests verify AMS/BAMS section ordering, footnotes, and Markdown cleanup from a
    real fixture.'
  - 'manifest fixture table DOI 10.1175/jamc-d-24-0048.1 (high confidence): Provider-local
    tests verify AMS image-only table extraction and inline table asset placement.'
allowed_runtimes:
- http
- browser
forbidden_behaviors:
- automatic_login
- captcha_solving
- paywall_bypass
- challenge_bypass
challenge_policy:
  captcha: stop and report; do not solve automatically
  access_challenge: stop and report; do not bypass challenge pages
  rate_limit: retry only within normal provider retry budget or stop for operator
    review
site_temporary_policy:
  summary: No temporary exception is approved for AMS onboarding.
  expires_at: null
may_continue: true
notes: Approved only for legal AMS/BAMS access already available in the operator
  environment, including public/open articles and any existing entitlement; do not
  automate login, solve CAPTCHA, or bypass access gates.
