schema_version: 1
provider: annualreviews
status: approved
reviewed_at: "2026-05-23T00:00:00Z"
reviewed_by: operator
legal_access:
  mode: institutional_subscription
  evidence:
  - Operator approves Annual Reviews onboarding using lawful institutional
    subscription access available in the current environment.
  - Browser runtime may access Annual Reviews article HTML and PDF routes only
    when they are legally available to the operator's environment.
  - Preliminary local probing observed ordinary HTTP Cloudflare challenge behavior
    and browser-visible subscription/purchase access UI; these signals must not
    be bypassed or treated as authorization to evade access controls.
allowed_runtimes:
- browser
forbidden_behaviors:
- automatic_login
- captcha_solving
- paywall_bypass
- challenge_bypass
challenge_policy:
  captcha: stop and report; do not solve automatically
  access_challenge: stop and report; do not bypass challenge pages
  rate_limit: stop for operator review unless an approved retry policy is added
site_temporary_policy:
  summary: No temporary exception is approved for Annual Reviews onboarding.
  expires_at: null
may_continue: true
notes: Browser runtime may use lawful institutional subscription access already
  available in the operator environment. Do not automate login, solve CAPTCHA,
  bypass paywalls, bypass Cloudflare or other access challenges, or continue
  after access gate, challenge, CAPTCHA, 403, rate limit, or subscription
  unavailability signals; stop and report a structured error instead.
