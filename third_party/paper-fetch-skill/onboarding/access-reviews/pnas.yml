schema_version: 1
provider: pnas
status: approved
reviewed_at: '2026-05-22T00:00:00Z'
reviewed_by: operator
legal_access:
  mode: institutional_subscription
  evidence:
  - onboarding/known-providers.yml marks pnas as implemented with manifest
    onboarding/manifests/pnas.yml.
  - onboarding/manifests/pnas.yml declares display_source=pnas and main_path=['article_html',
    'pdf_fallback', 'abstract_only'].
  - registered provider bundle sources=pnas; requires_browser_runtime=True; requires_playwright=False.
  - docs/providers.md documents PNAS as a CloakBrowser fast HTML preflight route with
    CloakBrowser HTML and seeded-browser publisher PDF/ePDF fallback; older or gated
    pages may return abstract-only rather than full text.
  - 'manifest fixture abstract_only DOI 10.1073/pnas.2509692123 (high confidence):
    Block fixture coverage verifies PNAS provider-managed abstract-only degradation.'
  - 'manifest fixture access_gate DOI 10.1073/pnas.2509692123 (high confidence): Block
    fixture coverage records a PNAS access-gated article page and extracted abstract
    Markdown.'
  - 'manifest fixture figure DOI 10.1073/pnas.2309123120 (medium confidence): Provider-local
    tests verify PNAS rendered Markdown cleanup and article assembly on a figure-capable
    fixture.'
  - 'manifest fixture pdf_fallback DOI 10.1073/pnas.2406303121 (high confidence):
    Provider-local tests exercise PNAS abstract-only recovery followed by PDF fallback
    using recorded Markdown.'
  - 'manifest fixture references DOI 10.1073/pnas.2309123120 (medium confidence):
    Provider-local tests exercise PNAS article assembly on a real fixture that includes
    provider reference handling.'
  - 'manifest fixture structure DOI 10.1073/pnas.2309123120 (high confidence): Provider-local
    tests verify PNAS authors, body structure, and site chrome cleanup from a real
    fixture.'
allowed_runtimes:
- http
- browser
forbidden_behaviors:
- automatic_login
- captcha_solving
- paywall_bypass
- challenge_bypass
challenge_policy:
  captcha: stop and report; do not solve automatically
  access_challenge: stop and report; do not bypass challenge pages
  rate_limit: retry only within normal provider retry budget or stop for operator
    review
site_temporary_policy:
  summary: No temporary exception is approved for PNAS onboarding.
  expires_at: null
may_continue: true
notes: Approved only for legal PNAS access already available in the operator
  environment, including public/open articles and any existing entitlement; do not
  automate login, solve CAPTCHA, or bypass access gates.
