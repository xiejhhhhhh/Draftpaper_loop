schema_version: 1
provider: iop
status: approved
reviewed_at: '2026-05-27T07:21:20Z'
reviewed_by: codex-agent
legal_access:
  mode: public_open_access
  evidence:
  - onboarding/manifests/iop.yml records IOP routing through the 10.1088/ DOI prefix
    and iopscience.iop.org article pages.
  - The IOP provider only uses public article HTML/PDF routes or already available
    legal browser context; unauthenticated IOP SFTP TDM delivery is not implemented.
  - Committed IOP fixtures were captured from public article HTML/PDF routes for
    10.1088/1748-9326/ab7d02, 10.1088/2058-9565/ac3460, and
    10.1088/1748-9326/aa9f73.
  - Provider-local tests and manifest contract require Radware/hCaptcha challenge
    pages to be rejected rather than solved or bypassed.
allowed_runtimes:
- browser
- playwright
forbidden_behaviors:
- automatic_login
- captcha_solving
- paywall_bypass
- challenge_bypass
challenge_policy:
  captcha: stop and report; do not solve automatically
  access_challenge: stop and report; do not bypass challenge pages
  rate_limit: retry only within normal provider retry budget or stop for operator
    review
site_temporary_policy:
  summary: No temporary exception is approved for IOP onboarding.
  expires_at: null
may_continue: true
notes: Approved only for public/open IOP article pages or existing legal entitlement
  in the browser context. Browser runtime must stop on CAPTCHA, access challenge,
  login, or paywall flows.
