schema_version: 1
provider: elsevier
status: approved
reviewed_at: '2026-05-22T00:00:00Z'
reviewed_by: operator
legal_access:
  mode: operator_provided_credentials
  evidence:
  - onboarding/known-providers.yml marks elsevier as implemented with manifest
    onboarding/manifests/elsevier.yml.
  - onboarding/manifests/elsevier.yml declares display_source=elsevier_xml
    and main_path=['xml', 'pdf_fallback', 'metadata_only'].
  - registered provider bundle sources=elsevier_xml, elsevier_pdf; requires_browser_runtime=False;
    requires_playwright=False.
  - README.md documents that Elsevier official XML/API and PDF fallback require an
    operator-provided ELSEVIER_API_KEY from dev.elsevier.com.
  - 'manifest fixture figure DOI 10.1016/j.rse.2026.115369 (high confidence): Provider-local
    tests exercise appendix figure placement and Markdown image ordering from the
    real XML fixture.'
  - 'manifest fixture formula DOI 10.1016/j.agrformet.2024.109975 (high confidence):
    Provider-local tests exercise equation labels and MathML rendering from the real
    XML fixture.'
  - 'manifest fixture references DOI 10.1016/j.agrformet.2024.109975 (high confidence):
    Provider-local tests verify numbered Elsevier XML references and rendered reference
    formatting.'
  - 'manifest fixture structure DOI 10.1016/j.rse.2025.114648 (high confidence): Golden
    XML fixture and provider benchmark cover Elsevier XML body structure and article
    section assembly.'
  - 'manifest fixture supplementary DOI 10.1016/j.ecolind.2024.112140 (high confidence):
    Provider-local tests exercise Elsevier supplementary-material extraction from
    the real XML fixture.'
  - 'manifest fixture table DOI 10.1016/j.jhydrol.2021.126210 (high confidence): Provider-local
    Markdown tests exercise a real Elsevier body table fixture and table conversion
    notes.'
allowed_runtimes:
- http
forbidden_behaviors:
- automatic_login
- captcha_solving
- paywall_bypass
- challenge_bypass
challenge_policy:
  captcha: stop and report; do not solve automatically
  access_challenge: stop and report; do not bypass challenge pages
  rate_limit: retry only within normal provider retry budget or stop for operator
    review
site_temporary_policy:
  summary: No temporary exception is approved for Elsevier onboarding.
  expires_at: null
may_continue: true
notes: Approved only for official Elsevier API/XML and API PDF fallback using
  operator-provided credentials; do not scrape paywalled ScienceDirect HTML, log in,
  solve challenges, or bypass access controls.
