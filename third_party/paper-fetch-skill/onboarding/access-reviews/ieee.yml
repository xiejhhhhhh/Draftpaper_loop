schema_version: 1
provider: ieee
status: approved
reviewed_at: '2026-05-22T00:00:00Z'
reviewed_by: operator
legal_access:
  mode: institutional_subscription
  evidence:
  - onboarding/known-providers.yml marks ieee as implemented with manifest
    onboarding/manifests/ieee.yml.
  - onboarding/manifests/ieee.yml declares display_source=ieee_html and main_path=['landing_html',
    'article_html', 'pdf_fallback', 'abstract_only'].
  - registered provider bundle sources=ieee_html, ieee_pdf; requires_browser_runtime=False;
    requires_playwright=False.
  - docs/providers.md states IEEE fulltext attempts assume the operator runtime
    already has legal IEEE Xplore authorization, such as institution IP, VPN, logged-in
    browser state, or personal subscription.
  - 'manifest fixture abstract_only DOI 10.1109/PGEC.1967.264619 (high confidence):
    Provider-local tests verify IEEE provider-managed abstract-only return when PDF
    fallback reaches an access challenge.'
  - 'manifest fixture figure DOI 10.1109/TIM.2024.3509573 (high confidence): Provider-local
    tests verify IEEE figure and table markers from the recorded TIM fixture.'
  - 'manifest fixture formula DOI 10.1109/CICTN64563.2025.10932570 (high confidence):
    Provider-local tests verify IEEE formula extraction and absence of formula-unavailable
    placeholders.'
  - 'manifest fixture pdf_fallback DOI 10.1109/MPER.1985.5526567 (high confidence):
    Provider-local tests exercise legacy IEEE PDF fallback candidates and text-only
    PDF article assembly.'
  - 'manifest fixture references DOI 10.1109/ACCESS.2024.3352924 (high confidence):
    Provider-local tests verify IEEE raw citation text overrides DOI-only metadata
    references.'
  - 'manifest fixture structure DOI 10.1109/ACCESS.2024.3352924 (high confidence):
    Provider-local golden tests verify IEEE Xplore HTML structure, sections, references,
    and Markdown cleanup.'
  - 'manifest fixture supplementary DOI 10.1109/RITA.2026.3668995 (medium confidence):
    Provider-local manifest-shape tests record IEEE multimedia and supplementary assets
    for a real fixture.'
  - 'manifest fixture table DOI 10.1109/TBME.2024.3434477 (high confidence): Provider-local
    tests verify IEEE table assets and table-kind preservation from a real fixture.'
allowed_runtimes:
- http
forbidden_behaviors:
- automatic_login
- captcha_solving
- paywall_bypass
- challenge_bypass
challenge_policy:
  captcha: stop and report; do not solve automatically
  access_challenge: stop and report; do not bypass challenge pages
  rate_limit: retry only within normal provider retry budget or stop for operator
    review
site_temporary_policy:
  summary: No temporary exception is approved for IEEE onboarding.
  expires_at: null
may_continue: true
notes: Approved only for legal IEEE Xplore access already available in the operator
  environment; do not automate login, solve CAPTCHA, or bypass access gates.
