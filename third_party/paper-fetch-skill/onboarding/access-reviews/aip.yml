schema_version: 1
provider: aip
status: approved
reviewed_at: '2026-05-27T10:15:00Z'
reviewed_by: operator
legal_access:
  mode: public_open_access
  evidence:
    - The onboarding request identifies https://pubs.aip.org/ as the target AIP
      Publishing domain and limits implementation to provider-owned public/open
      article pages or legally available entitlement in the operator environment.
    - Discovery evidence records AIP Publishing DOI routing through the 10.1063/
      prefix and pubs.aip.org article routes.
    - AIP browser access is required because direct HTTP probes to pubs.aip.org
      article and PDF URLs return 403 in the current environment.
allowed_runtimes:
  - http
  - browser
forbidden_behaviors:
  - automatic_login
  - captcha_solving
  - paywall_bypass
  - challenge_bypass
challenge_policy:
  captcha: stop and report; do not solve automatically
  access_challenge: stop and report; do not bypass challenge pages
  rate_limit: retry only within normal provider retry budget or stop for operator
    review
site_temporary_policy:
  summary: No temporary exception is approved for AIP onboarding.
  expires_at: null
may_continue: true
notes: Approved only for public/open AIP article pages or existing legal access in
  the operator environment. Do not automate login, solve CAPTCHA, or bypass access
  gates.
