schema_version: 1
provider: science
status: approved
reviewed_at: '2026-05-22T00:00:00Z'
reviewed_by: operator
legal_access:
  mode: institutional_subscription
  evidence:
  - onboarding/known-providers.yml marks science as implemented with manifest
    onboarding/manifests/science.yml.
  - onboarding/manifests/science.yml declares display_source=science and main_path=['article_html',
    'pdf_fallback', 'abstract_only'].
  - registered provider bundle sources=science; requires_browser_runtime=True; requires_playwright=False.
  - docs/providers.md documents Science as a CloakBrowser HTML route with seeded-browser
    publisher PDF/ePDF fallback; AAAS access gate or missing entitlement must degrade
    to abstract-only or metadata-only rather than bypassing access controls.
  - 'manifest fixture abstract_only DOI 10.1126/science.aeg3511 (high confidence):
    Block fixture coverage verifies Science provider-managed abstract-only behavior
    before PDF recovery or final degradation.'
  - 'manifest fixture access_gate DOI 10.1126/science.aeg3511 (high confidence): Block
    fixture coverage records a Science access-gated article page and extracted abstract
    Markdown.'
  - 'manifest fixture figure DOI 10.1126/sciadv.adl6155 (high confidence): Provider-local
    tests map Science extracted figure assets to recorded local body assets.'
  - 'manifest fixture formula DOI 10.1126/science.adz3492 (medium confidence): Provider-local
    asset tests cover Science SVG formula or figure assets from a real fixture.'
  - 'manifest fixture pdf_fallback DOI 10.1126/science.aeg3511 (high confidence):
    Block and golden Markdown fixtures exercise Science paywall recovery into provider
    PDF fallback.'
  - 'manifest fixture references DOI 10.1126/science.adp0212 (medium confidence):
    Provider-local tests exercise Science provider-owned metadata and article assembly
    on a real fixture.'
  - 'manifest fixture structure DOI 10.1126/science.abp8622 (high confidence): Provider-local
    tests verify Science front matter, abstract handling, authors, and body sections
    from a real fixture.'
allowed_runtimes:
- http
- browser
forbidden_behaviors:
- automatic_login
- captcha_solving
- paywall_bypass
- challenge_bypass
challenge_policy:
  captcha: stop and report; do not solve automatically
  access_challenge: stop and report; do not bypass challenge pages
  rate_limit: retry only within normal provider retry budget or stop for operator
    review
site_temporary_policy:
  summary: No temporary exception is approved for Science onboarding.
  expires_at: null
may_continue: true
notes: Approved only for legal Science/AAAS access already available in the operator
  environment; access gates must stop or degrade, not trigger login automation or
  bypass behavior.
