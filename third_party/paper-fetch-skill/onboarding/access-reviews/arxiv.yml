schema_version: 1
provider: arxiv
status: approved
reviewed_at: '2026-05-22T00:00:00Z'
reviewed_by: operator
legal_access:
  mode: public_open_access
  evidence:
  - onboarding/known-providers.yml marks arxiv as implemented with manifest
    onboarding/manifests/arxiv.yml.
  - onboarding/manifests/arxiv.yml declares display_source=arxiv_html and
    main_path=['article_html', 'pdf_fallback', 'metadata_only'].
  - registered provider bundle sources=arxiv_html, arxiv_pdf; requires_browser_runtime=False;
    requires_playwright=False.
  - docs/providers.md documents arXiv official HTML, direct HTTP PDF fallback, and
    internal Atom API metadata enrichment without login, subscription, or browser
    runtime requirements.
  - 'manifest fixture figure DOI 10.48550/arxiv.2605.06667v1 (high confidence): Unit
    coverage for this fixture verifies that arXiv HTML images are retained while repeated
    appendix captions are suppressed.'
  - 'manifest fixture formula DOI 10.48550/arxiv.2605.06653v1 (medium confidence):
    Golden fixture covers arXiv HTML generated from math-heavy source content.'
  - 'manifest fixture pdf_fallback DOI 10.48550/arxiv.1406.2661v1 (high confidence):
    Golden fixture records arXiv PDF fallback replay for Generative Adversarial Networks.'
  - 'manifest fixture references DOI 10.48550/arxiv.2605.06663v1 (high confidence):
    arXiv HTML extraction has provider-owned reference extraction tests on the official
    HTML route.'
  - 'manifest fixture structure DOI 10.48550/arxiv.2605.06663v1 (high confidence):
    Golden fixture exercises the official HTML article route with title, abstract,
    and body extraction.'
  - 'manifest fixture table DOI 10.48550/arxiv.2605.06663v1 (medium confidence): Unit
    tests exercise arXiv table block rendering against the HTML extraction path.'
allowed_runtimes:
- http
forbidden_behaviors:
- automatic_login
- captcha_solving
- paywall_bypass
- challenge_bypass
challenge_policy:
  captcha: stop and report; do not solve automatically
  access_challenge: stop and report; do not bypass challenge pages
  rate_limit: retry only within normal provider retry budget or stop for operator
    review
site_temporary_policy:
  summary: No temporary exception is approved for arXiv onboarding.
  expires_at: null
may_continue: true
notes: Approved for public arXiv HTML, PDF, e-print, and metadata API routes only;
  do not log in, solve challenges, or bypass rate limits.
