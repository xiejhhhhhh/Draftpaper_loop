schema_version: 1
provider: plos
status: approved
reviewed_at: '2026-05-24T11:22:49Z'
reviewed_by: operator
legal_access:
  mode: public_open_access
  evidence:
  - PLOS states that it publishes research articles and artifacts under CC-BY open access licensing; source https://plos.org/open-science/.
  - PLOS licenses and copyright guidance applies CC BY 4.0 or comparable unrestricted licenses to articles and other works it publishes; source https://journals.plos.org/plosmedicine/s/licenses-and-copyright.
  - PLOS Text and Data Mining guidance says PLOS articles may be mined, reused, and shared, and recommends JATS XML for article text and metadata; source https://api.plos.org/text-and-data-mining.html.
  - Approved provider seed uses DOI prefix 10.1371 and domain journals.plos.org.
  - Approved main path for manifest discovery is xml, then pdf_fallback, then metadata_only; HTML is intentionally not part of the approved route.
allowed_runtimes:
- http
forbidden_behaviors:
- automatic_login
- captcha_solving
- paywall_bypass
- challenge_bypass
challenge_policy:
  captcha: stop and report; do not solve automatically
  access_challenge: stop and report; do not bypass challenge pages
  rate_limit: retry only within normal provider retry budget or stop for operator
    review
site_temporary_policy:
  summary: No temporary exception is approved; use only public PLOS HTTP XML/PDF/API endpoints and stop on challenge, paywall, or sustained rate limiting.
  expires_at: null
may_continue: true
notes: Operator approved PLOS onboarding access on 2026-05-24. Discovery should prefer JATS XML, use PDF only as fallback, then metadata_only; do not use HTML as a fulltext route unless operator updates this review.
