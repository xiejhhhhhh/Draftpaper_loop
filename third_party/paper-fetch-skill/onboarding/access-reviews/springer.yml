schema_version: 1
provider: springer
status: approved
reviewed_at: '2026-05-22T00:00:00Z'
reviewed_by: operator
legal_access:
  mode: public_open_access
  evidence:
  - onboarding/known-providers.yml marks springer as implemented with manifest
    onboarding/manifests/springer.yml.
  - onboarding/manifests/springer.yml declares display_source=springer_html
    and main_path=['article_html', 'pdf_fallback', 'abstract_only', 'metadata_only'].
  - registered provider bundle sources=springer_html, springer_pdf; requires_browser_runtime=False;
    requires_playwright=False.
  - docs/providers.md documents Springer/Nature as direct HTML followed by direct
    HTTP PDF fallback, with abstract-only or metadata-only degradation when full text
    is unavailable.
  - 'manifest fixture abstract_only DOI 10.1007/s00382-018-4286-0 (medium confidence):
    Block fixture coverage verifies Springer preview or abstract-only page cleanup
    and provider-managed degradation.'
  - 'manifest fixture access_gate DOI 10.1007/s00382-018-4286-0 (medium confidence):
    Block fixture coverage verifies Springer preview text is stripped from Markdown
    output.'
  - 'manifest fixture figure DOI 10.1038/s41561-022-00912-7 (high confidence): Provider-local
    tests verify Springer figure placement and downloaded asset rewrite for a real
    fixture.'
  - 'manifest fixture formula DOI 10.1038/nature12915 (high confidence): Provider-local
    tests exercise Springer/Nature formula image extraction from a real fixture.'
  - 'manifest fixture references DOI 10.1007/s10584-011-0143-4 (medium confidence):
    Provider-local tests use a real Springer article fixture while separately verifying
    numbered reference extraction behavior.'
  - 'manifest fixture structure DOI 10.1038/s43247-024-01885-8 (high confidence):
    Provider-local tests build a real Springer/Nature article and verify body, data
    availability, and code availability sections.'
  - 'manifest fixture supplementary DOI 10.1038/s41561-022-00912-7 (high confidence):
    Provider-local tests exercise Springer supplementary section extraction and source-data
    separation.'
  - 'manifest fixture table DOI 10.1038/s43247-024-01295-w (high confidence): Provider-local
    table tests exercise a real Nature table page and inline table injection.'
allowed_runtimes:
- http
forbidden_behaviors:
- automatic_login
- captcha_solving
- paywall_bypass
- challenge_bypass
challenge_policy:
  captcha: stop and report; do not solve automatically
  access_challenge: stop and report; do not bypass challenge pages
  rate_limit: retry only within normal provider retry budget or stop for operator
    review
site_temporary_policy:
  summary: No temporary exception is approved for Springer onboarding.
  expires_at: null
may_continue: true
notes: Approved for public Springer/Nature/BMC HTML and PDF routes only; subscription
  content must degrade rather than using login automation, CAPTCHA solving, or access
  bypass.
