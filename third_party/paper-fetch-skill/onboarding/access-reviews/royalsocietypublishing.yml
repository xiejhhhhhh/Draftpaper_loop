schema_version: 1
provider: royalsocietypublishing
status: approved
reviewed_at: "2026-05-22T00:00:00Z"
reviewed_by: operator
legal_access:
  mode: public_open_access
  evidence:
  - Royal Society Publishing DOI pages are publicly reachable over direct HTTP for
    tested 10.1098/ samples.
  - Direct DOI HTML redirects to public Silverchair article pages with full-text
    article widgets and body sections.
  - Public PDF fallback is reachable through citation_pdf_url and /doi/pdf/{doi}
    for tested samples.
  - citation_xml_url was probed and redirected back to HTML, so it is not approved
    as an XML full-text route.
allowed_runtimes:
- http
forbidden_behaviors:
- automatic_login
- captcha_solving
- paywall_bypass
- challenge_bypass
challenge_policy:
  captcha: stop and report; do not solve automatically
  access_challenge: stop and report; do not bypass challenge pages
  rate_limit: retry only within normal provider retry budget or stop for operator
    review
site_temporary_policy:
  summary: No temporary exception is approved for Royal Society Publishing onboarding.
  expires_at: null
may_continue: true
notes: Approved for direct DOI HTML, direct public PDF fallback, and metadata-only
  fallback only. CloakBrowser/browser runtime is not approved for the onboarding
  main path. Do not treat citation_xml_url as an XML full-text route.
