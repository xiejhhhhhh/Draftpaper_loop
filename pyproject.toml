[project]
name = "draftpaper-cli"
version = "0.1.0"
description = "Local-first staged CLI workflow for research paper projects."
readme = "docs/cli_workflow_priority_guide.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
authors = [
  { name = "xiejhhhhhh", email = "xiejinhui22@mails.ucas.ac.cn" }
]
keywords = ["research", "latex", "paper-writing", "cli", "codex-skills"]

[project.optional-dependencies]
plotting = [
  "numpy",
  "pandas",
  "matplotlib",
  "SciencePlots",
  "scipy",
  "seaborn",
  "scikit-learn",
]
plotting-full = [
  "numpy",
  "pandas",
  "matplotlib",
  "SciencePlots",
  "scipy",
  "seaborn",
  "scikit-learn",
  "marsilea",
  "reportlab",
  "scikit-plot",
]

[project.scripts]
draftpaper = "draftpaper_cli.cli:main"

[tool.setuptools.packages.find]
include = ["draftpaper_cli*"]
exclude = ["codex_skills*", "github_submit*", "third_party*", "tests*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
